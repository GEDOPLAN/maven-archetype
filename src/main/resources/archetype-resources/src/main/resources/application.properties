# Datasource configuration
quarkus.datasource.db-kind=${jdbcKind}
quarkus.datasource.jdbc.url=${jdbcUrl}
quarkus.datasource.username=${jdbcUser}
quarkus.datasource.password=${jdbcPassword}

# Hibernate SQL script generation
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.scripts.generation=update
quarkus.hibernate-orm.scripts.generation.create-target=target/hibernate-migrations/update.sql

# Flyway configuration - runs after Hibernate creates the schema
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

